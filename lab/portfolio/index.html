<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Burak Karakaya — Selected Works</title>

  <!-- Lenis (smooth scroll) — 2D drag için kendi lerp loop'umuzu kullanıyoruz; -->
  <!-- Lenis ileride sayfa-içi vertical smoothing için hazır dursun diye yükleniyor. -->
  <script src="https://cdn.jsdelivr.net/npm/lenis@1.1.13/dist/lenis.min.js"></script>

  <style>
    :root {
      --canvas-bg: #e9e4df;
      --grid-line: rgba(0, 0, 0, 0.05);
      --grid-size: 56px;
      --nav-bg: #1f1d18;
      --nav-fg: rgba(255, 255, 255, 0.7);
      --nav-fg-strong: #ffffff;
      --easing: cubic-bezier(0.85, 0.09, 0.15, 0.91);
    }

    *,
    *::before,
    *::after { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
      overscroll-behavior: none;
      background-color: var(--canvas-bg);
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Segoe UI", Roboto, sans-serif;
      color: #1c1a14;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    img { display: block; max-width: 100%; }

    /* ───────────── Navbar (the "window header") ───────────── */
    .navbar {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 6px;
      background: rgba(15, 13, 10, 0.85);
      -webkit-backdrop-filter: blur(20px);
      backdrop-filter: blur(20px);
      border-radius: 10px;
      z-index: 100;
      color: var(--nav-fg);
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .navbar.is-visible { opacity: 1; }

    .navbar__logo {
      min-width: 36px;
      height: 28px;
      padding: 0 8px;
      border-radius: 6px;
      background: #b1a781;
      color: #1f1d18;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 0.02em;
    }

    .navbar__menu {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      align-items: center;
      gap: 2px;
    }

    .navbar__menu a {
      display: inline-flex;
      align-items: center;
      padding: 9px 12px;
      text-decoration: none;
      color: var(--nav-fg);
      text-transform: uppercase;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.04em;
      border-radius: 6px;
      transition: background-color 0.2s ease, color 0.2s ease;
    }

    .navbar__menu a:hover {
      background: rgba(255, 255, 255, 0.08);
      color: var(--nav-fg-strong);
    }

    /* ───────────── Canvas viewport ("window" the user looks through) ───────────── */
    .canvas-wrapper {
      position: fixed;
      inset: 0;
      overflow: hidden;
      background-color: var(--canvas-bg);
      background-image:
        linear-gradient(to right, var(--grid-line) 1px, transparent 1px),
        linear-gradient(to bottom, var(--grid-line) 1px, transparent 1px);
      background-size: var(--grid-size) var(--grid-size);
      cursor: grab;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }

    .canvas-wrapper.is-dragging { cursor: grabbing; }

    /* ───────────── Inner canvas (larger than viewport, transformed by JS) ───────────── */
    .canvas {
      position: absolute;
      top: 50%;
      left: 50%;
      width: var(--canvas-width);
      height: var(--canvas-height);
      transform: translate3d(-50%, -50%, 0);
      will-change: transform;
      pointer-events: none;
    }

    .canvas-content {
      position: relative;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    /* ───────────── Hero title (viewport ortasında SABİT, ama canvas stacking context'inde) ───────────── */
    .hero {
      position: absolute;
      top: 50%;
      left: 50%;
      /* transform JS tarafından her frame yazılır → canvas hareketinin tersi uygulanır,
         hero görsel olarak sabit kalır. Sadece -50% offset (centering) burada başlangıç değeri. */
      transform: translate(-50%, -50%);
      will-change: transform;
      text-align: center;
      pointer-events: none;
      /* Orta katman — back kartlar arkasında, front kartlar önünde */
      z-index: 5;
    }

    .hero__title {
      margin: 0;
      line-height: 0;
      mix-blend-mode: difference;
    }

    .hero__logo {
      display: block;
      width: auto;
      height: clamp(53px, 8vw, 99px);
      margin: 0 auto;
      overflow: visible;
    }

    .hero__logo-path {
      fill: transparent;
      stroke: #000;
      stroke-width: 10;
      stroke-linejoin: round;
      stroke-dasharray: var(--path-len);
      stroke-dashoffset: var(--path-len);
    }

    .hero__logo-path.is-drawing {
      animation: svgDraw 1.6s cubic-bezier(0.65, 0, 0.35, 1) forwards;
    }

    .hero__logo-path.is-filling {
      animation: svgFill 0.8s ease forwards;
    }

    @keyframes svgDraw {
      to { stroke-dashoffset: 0; }
    }

    @keyframes svgFill {
      0%   { fill: transparent; stroke-opacity: 1; }
      60%  { fill: #000; stroke-opacity: 0.4; }
      100% { fill: #000; stroke-opacity: 0; }
    }

    .hero__subtitle {
      margin: 12px 0 0;
      font-size: 14px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: rgba(0, 0, 0, 0.45);
      opacity: 0;
      transform: translateY(8px);
    }

    .hero__subtitle.is-visible {
      animation: subtitleIn 0.6s ease forwards;
    }

    @keyframes subtitleIn {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ───────────── Intro — kart düşme animasyonu ───────────── */
    .card {
      opacity: 0;
    }

    .card.is-intro {
      opacity: 1;
      animation: cardDrop 0.7s cubic-bezier(0.22, 1, 0.36, 1) backwards;
    }

    .card.is-ready {
      opacity: 1;
    }

    @keyframes cardDrop {
      from {
        opacity: 0;
        transform: translateY(-120px) scale(0.92);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* ───────────── Project cards ───────────── */
    .card {
      position: absolute;
      width: var(--card-w);
      height: var(--card-h);
      pointer-events: auto;
      cursor: pointer;
      will-change: transform;
      border-radius: 4px;
      overflow: hidden;
      background-color: rgba(0, 0, 0, 0.05);
      /* transform her frame JS'ten yazılır (mouse parallax + hover lift compose edilir).
         CSS transition burada yok → per-frame update'ler smear olmasın; smoothing JS lerp. */
    }
    /* Katmanlar — hero z-index: 5 baz alınarak */
    .card[data-layer="back"]  { z-index: 1;  }
    .card[data-layer="front"] { z-index: 10; }

    .card__inner {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    .card__image {
      /* Görsel kart boyutundan %36 büyük (her tarafta %18 taşar) → parallax marjini */
      position: absolute;
      inset: -18%;
      will-change: transform;
      background-color: rgba(0, 0, 0, 0.06);
    }

    /* img + video aynı katmanda absolute. Video kartlarında video img'in üstündedir
       → poster img'i hızla yüklenip boşluğu doldurur, video oynayınca üzerine biner. */
    .card__image img,
    .card__image video {
      position: absolute;
      inset: 0;
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      pointer-events: none;
      -webkit-user-drag: none;
    }

    .card__image video { z-index: 2; }
    .card__poster      { z-index: 1; }

    .card__meta {
      position: absolute;
      left: 0;
      right: 0;
      bottom: -28px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 0 2px;
      font-size: 12px;
      color: rgba(0, 0, 0, 0.55);
      opacity: 0;
      transform: translateY(-4px);
      transition: opacity 0.3s ease, transform 0.3s ease;
      pointer-events: none;
    }

    .card:hover .card__meta {
      opacity: 1;
      transform: translateY(0);
    }

    .card__name { font-weight: 500; color: rgba(0, 0, 0, 0.75); }
    .card__type { text-transform: uppercase; letter-spacing: 0.06em; font-size: 10px; }

    /* ───────────── Footer hint ───────────── */
    .hint {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.06);
      color: rgba(0, 0, 0, 0.55);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      pointer-events: none;
      z-index: 50;
      -webkit-backdrop-filter: blur(8px);
      backdrop-filter: blur(8px);
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .hint.is-visible { opacity: 1; }
  </style>
</head>

  <script>
    // ───────────── Project data ─────────────
    // type: "image" | "video"
    // poster_url: video için ilk frame (varsa). Image için yok sayılır.
    const PROJECTS = [

      { name: "IPEKYOL",       type: "video", media_url: "https://player.vimeo.com/external/591456280.hd.mp4?s=ceb6c93c814aca15b69046755f7d4bc39f62170c&profile_id=175",                                                                                  poster_url: "https://cdn.proj-e.com/proje/uploads/works/ipekyol-poster.jpg" },

      { name: "KORAYSPOR",     type: "video", media_url: "https://player.vimeo.com/progressive_redirect/playback/678758410/rendition/360p?loc=external&signature=3063870f55d4568f5d7e0d6157e63cbae97daa004f840f47ca0aa1ba62f65f0b",                       poster_url: "https://cdn.proj-e.com/proje/uploads/works/korayspor-poster.jpg" },
      { name: "KARTAL YUVASI", type: "video", media_url: "https://player.vimeo.com/progressive_redirect/playback/666666587/rendition/480p/480p.mp4?loc=external&signature=40196ce03d94406f41b218bbc6ccabada83631656ec4a03fae1b884e2d6449c7",            poster_url: "https://cdn.proj-e.com/proje/uploads/works/bjk-poster.jpg" },

      { name: "KONYALI SAAT",  type: "image", media_url: "https://cdn.proj-e.com/proje/uploads/works/works_500x500.jpg" },

      { name: "EXQUISE",       type: "video", media_url: "https://player.vimeo.com/progressive_redirect/playback/666665647/rendition/540p/540p.mp4?loc=external&signature=8874b7dd4693e71513310c133d60256b565469ee45809151d87f202fe5adff17",            poster_url: "https://cdn.proj-e.com/proje/uploads/works/exquise-poster.jpg" },

    // ───────────── Canvas / layout config ─────────────
    // 24 proje × 5 col = 5 row (son hücre boş kalır). Canvas'ı kompakt tutuyoruz
    // (3800×2500) → ilk açılışta hero'nun çevresindeki ring 1 kartların gözle
    // seçilebilir bir kısmı viewport'a düşsün, dış halkadaki kartlar da canvas
    // kenarına yakın dursun (kenarda boş "ölü" alan kalmasın). Padding'i
    // kasıtlı düşük tutuyoruz; collision separation pass clamp'i padding×0.4
    // olduğu için kartlar gerekirse canvas kenarına 40px'e kadar yanaşabilir.
    // Merkez hücre boş kalır (spiral merkez atlanır) → hero metnini hiçbir
    // kart örtmez.
    const CANVAS_W         = 3800;
    const CANVAS_H         = 2500;
    const CANVAS_PADDING_X = 100;
    const CANVAS_PADDING_Y = 100;
    const COLS = 5;
    const ROWS = Math.ceil(PROJECTS.length / COLS);
    const CELL_RANDOM_RANGE = 0.28; // hücre boyutunun ±%14'ü kadar rastgele kayma
    const COLLISION_GAP     = 24;   // kartlar arası min boşluk (px) — separation pass'te kullanılır

    // Tüm kartlar 1:1 (kare). Sadece boyut çeşitleniyor → tutarlı bir grid hissi
    // + içerik (image/video) tipinden bağımsız aynı görsel ritim.
    function getCardSize(i) {
      if (i % 4 === 0) return { w: 520, h: 520, type: "large"  };
      if (i % 4 === 1) return { w: 420, h: 420, type: "medium" };
      if (i % 4 === 2) return { w: 480, h: 480, type: "medium" };
      return                  { w: 360, h: 360, type: "small"  };
    }

    // Deterministik (seeded) random — her açılışta aynı dağılım, ama "random gibi"
    function rand(seed) {
      const x = Math.sin(seed * 9999.137) * 43758.5453;
      return x - Math.floor(x);
    }

    // ───────────── Spiral cell ordering (center → outward) ─────────────
    // Merkezden başlayıp saat yönünde dışa doğru sarmal hücre sırası üretir.
    // PROJECTS[0] → ring 1 ilk hücre (sağ), [1..7] → ring 1 spiral, [8..23] → ring 2.
    // Merkez hücre kasıtlı olarak ATLANIR → hero metni boş alanda kalır,
    // kart hero'yu kapatmaz (sadece kenardan kuşatır).
    // Algoritma: standart "expanding step length" sarmal. Adım dizisi 1,1,2,2,3,3,...
    // her iki adım dönüşünde adım uzunluğu artar. Her adımda yön saat yönü
    // dönerken (dx,dy)→(-dy,dx) rotation uygulanır.
    function generateSpiralCells(cols, rows) {
      const cx = Math.floor(cols / 2);
      const cy = Math.floor(rows / 2);
      const total = cols * rows;
      const need = total - 1; // merkez hariç
      const inBounds = (x, y) => x >= 0 && x < cols && y >= 0 && y < rows;

      const cells = [];
      let x = cx, y = cy;
      let dx = 1, dy = 0; // başlangıç yönü: sağ
      let steps = 1;
      let dirCount = 0;
      let safetyIter = 0;
      const maxIter = (cols + rows) * 4 + 16;

      while (cells.length < need && safetyIter++ < maxIter) {
        for (let s = 0; s < steps; s++) {
          x += dx;
          y += dy;
          if (inBounds(x, y)) {
            cells.push({ col: x, row: y });
            if (cells.length >= need) break;
          }
        }
        // saat yönü dönüş: right→down→left→up→right
        const ndx = -dy;
        const ndy =  dx;
        dx = ndx;
        dy = ndy;
        dirCount++;
        if (dirCount === 2) { steps++; dirCount = 0; }
      }
      return cells;
    }

    // ───────────── Build cards ─────────────
    const canvas        = document.getElementById("canvas");
    const canvasContent = document.getElementById("canvasContent");
    canvas.style.setProperty("--canvas-width",  CANVAS_W + "px");
    canvas.style.setProperty("--canvas-height", CANVAS_H + "px");

    // Grid yalnızca padding'in iç kısmına yerleşir → köşelerdeki kartlar canvas kenarına yapışmaz
    const gridW = CANVAS_W - 2 * CANVAS_PADDING_X;
    const gridH = CANVAS_H - 2 * CANVAS_PADDING_Y;
    const cellW = gridW / COLS;
    const cellH = gridH / ROWS;

    // Spiral hücre sırası — merkezden dışa doğru. Merkez hücre dahil değil.
    // Ring 1 (hero'nun en yakın komşuları) → cells[0..7]
    // Ring 2 (dış halka)                    → cells[8..23]
    const spiralCells = generateSpiralCells(COLS, ROWS);
    const RING1_COUNT = 8; // 5×5 grid'te merkez etrafındaki ilk halka

    // 1) Önce tüm pozisyonları hesapla (rect listesi). 2) Collision separation
    //    pass çalıştır (üst üste binen kartları minimum eksende ittir). 3) Final
    //    konuma göre DOM'u inşa et ve _snapX/_snapY cache'le.
    // PROJECTS[i] → spiralCells[i] eşleşmesi: array'in başı hero'ya en yakın,
    // sonu en uzak. İlk 8 (ring 1) hero'yu kuşatır, kalan 16 dış halkadadır.
    const placements = [];
    PROJECTS.forEach((project, i) => {
      const cell = spiralCells[i];
      if (!cell) return; // proje sayısı hücre sayısını aşarsa atla (defensive)
      placements.push(computePlacement(project, i, cell.col, cell.row));
    });

    function computePlacement(project, i, col, row) {
      const size  = getCardSize(i);

      const baseX = CANVAS_PADDING_X + col * cellW + cellW / 2;
      const baseY = CANVAS_PADDING_Y + row * cellH + cellH / 2;

      const r1 = rand(i * 1.13 + 7);
      const r2 = rand(i * 2.71 + 3);
      const offX = (r1 - 0.5) * cellW * CELL_RANDOM_RANGE;
      const offY = (r2 - 0.5) * cellH * CELL_RANDOM_RANGE;

      return {
        project, i,
        size,
        x: baseX + offX - size.w / 2,
        y: baseY + offY - size.h / 2,
        w: size.w,
        h: size.h,
        // Ring 1 (hero'nun komşuları) — random offset ile hero kenarına yaklaşma
        // ihtimaline karşı back-layer'a atanır → hero metni üstünde kalır.
        isInnerRing: i < RING1_COUNT,
      };
    }

    // ───────────── Collision separation ─────────────
    // Pair-wise AABB overlap — varsa minimum eksende ittirip ayır. Birkaç
    // iterasyon yeter; convergence için "moved" bayrağı ile erken çıkış.
    function resolveCollisions(rects, iterations = 8, gap = COLLISION_GAP) {
      const minX = CANVAS_PADDING_X * 0.4;
      const maxX = CANVAS_W - CANVAS_PADDING_X * 0.4;
      const minY = CANVAS_PADDING_Y * 0.4;
      const maxY = CANVAS_H - CANVAS_PADDING_Y * 0.4;

      for (let iter = 0; iter < iterations; iter++) {
        let moved = false;
        for (let i = 0; i < rects.length; i++) {
          for (let j = i + 1; j < rects.length; j++) {
            const a = rects[i];
            const b = rects[j];
            const overlapX = Math.min(a.x + a.w, b.x + b.w) - Math.max(a.x, b.x);
            const overlapY = Math.min(a.y + a.h, b.y + b.h) - Math.max(a.y, b.y);

            if (overlapX + gap > 0 && overlapY + gap > 0) {
              // Minimum eksende ayır → en az görsel bozulma
              if (overlapX < overlapY) {
                const push = (overlapX + gap) / 2;
                if (a.x < b.x) { a.x -= push; b.x += push; }
                else           { a.x += push; b.x -= push; }
              } else {
                const push = (overlapY + gap) / 2;
                if (a.y < b.y) { a.y -= push; b.y += push; }
                else           { a.y += push; b.y -= push; }
              }
              moved = true;
            }
          }
        }
        // Canvas dışına itilen kartları geri çek (clamp)
        for (let i = 0; i < rects.length; i++) {
          const r = rects[i];
          if (r.x < minX)            r.x = minX;
          if (r.x + r.w > maxX)      r.x = maxX - r.w;
          if (r.y < minY)            r.y = minY;
          if (r.y + r.h > maxY)      r.y = maxY - r.h;
        }
        if (!moved) break;
      }
    }
    resolveCollisions(placements);

    placements.forEach((p) => placeCard(p));

    function placeCard(p) {
      const { project, i, size, x, y, isInnerRing } = p;

      // Parallax katsayısı (1.0 - 2.6) → her kart farklı derinlik hissi
      const parallax = 1.0 + rand(i + 100) * 1.6;

      const card = document.createElement("div");
      card.className = "card";
      card.style.setProperty("--card-w", size.w + "px");
      card.style.setProperty("--card-h", size.h + "px");
      card.style.left = x + "px";
      card.style.top  = y + "px";
      card.dataset.parallax = parallax.toFixed(3);
      card.dataset.type     = size.type;
      card.dataset.media    = project.type; // "image" | "video"

      // Per-card cache → RAF loop'unda her frame attribute parse etmemek için
      card._w = size.w;
      card._h = size.h;
      card._parallax = parallax;
      card._parallaxIntensity = 0.55 + ((parallax - 1.0) / 1.6) * 0.45;
      card._reachX = 0.6 + rand(i * 3.71 + 11) * 0.9;
      card._reachY = 0.6 + rand(i * 5.13 + 17) * 0.9;

      // İç halka (hero komşuları) her zaman back-layer → hero metnini örtmez.
      // Dış halkada %30 back, %70 front rastgele dağılım korunuyor.
      const isBack = isInnerRing || rand(i * 11.7 + 5) < 0.30;
      card.dataset.layer = isBack ? "back" : "front";

      // Snap hedefi (final konuma göre — collision sonrası)
      card._snapX = CANVAS_W / 2 - (x + size.w / 2);
      card._snapY = CANVAS_H / 2 - (y + size.h / 2);

      // Media: video veya image
      // Video kartlarında poster'ı ALT katmana statik <img> olarak da ekliyoruz →
      // <video preload="metadata"> metadata gelene kadar boş kare göstermesin diye.
      // Img anında yüklenir, video sonradan üzerine biner. Img 404 verirse
      // onerror ile gizlenir, .card__image bg-color zemini görünür.
      let mediaHtml;
      if (project.type === "video") {
        const posterImg = project.poster_url
          ? `<img class="card__poster" src="${project.poster_url}" alt="${project.name}" loading="eager" draggable="false" onerror="this.style.display='none'" />`
          : "";
        mediaHtml = `${posterImg}<video class="card__media" src="${project.media_url}"${project.poster_url ? ` poster="${project.poster_url}"` : ""} muted playsinline loop preload="metadata" disablepictureinpicture></video>`;
      } else {
        mediaHtml = `<img class="card__media" src="${project.media_url}" alt="${project.name}" loading="lazy" draggable="false" />`;
      }

      card.innerHTML = `
        <div class="card__inner">
          <div class="card__image">
            ${mediaHtml}
          </div>
        </div>
        <div class="card__meta">
          <span class="card__name">${project.name}</span>
          <span class="card__type">${size.type}</span>
        </div>
      `;

      card._imageEl = card.querySelector(".card__image");
      card._videoEl = project.type === "video" ? card.querySelector("video") : null;
      card._isVisible = false; // viewport-aware play/pause state

      card.addEventListener("click", (e) => {
        if (drag.didMove) e.preventDefault();
      });

      canvasContent.appendChild(card);
    }

    const cards = [...document.querySelectorAll(".card")];
    const videoCards = cards.filter((c) => c._videoEl); // perf: viewport check sadece video kartlar için
    const hero  = document.querySelector(".hero");

    // ───────────── Mouse parallax (desktop / fine pointer) ─────────────
    // Mouse pencere ortasında → kartlar olduğu yerde. Mouse kenara yaklaştıkça
    // kartlar derinliklerine göre hafifçe TERS yönde kayar (klasik depth/window
    // hissi). Her kart kendi _parallax (1.0–2.6) katsayısıyla farklı miktarda
    // hareket eder → "yakın" görünen kartlar daha çok, "uzaktakiler" daha az
    // kayar; x/y'den z izlenimi bu desync'ten gelir.
    // Coarse pointer (touch) cihazlarda devre dışı → mobilde gereksiz iş yok.
    const FINE_POINTER             = window.matchMedia("(hover: hover) and (pointer: fine)").matches;
    const MOUSE_LERP               = 0.06;  // current → target hız
    const MOUSE_PARALLAX_STRENGTH  = 8;     // px / depth-unit — toplam max ≈ 8 × 2.6 ≈ 21px
    const MOUSE_PARALLAX_DIRECTION = -1;    // -1 = mouse'un tersi (depth), +1 = takip

    const mouse = {
      target:  { x: 0, y: 0 }, // -1..1 (window center = 0)
      current: { x: 0, y: 0 },
    };

    if (FINE_POINTER) {
      window.addEventListener("mousemove", (e) => {
        // window center = (0,0); sağ-alt köşe (1,1); sol-üst (-1,-1).
        // state.vw/vh resize-debounce ile güncellenir; mousemove yüksek-frekans olduğu
        // için doğrudan innerWidth/Height okumak DOM hesabı tetiklemez (read-only).
        mouse.target.x = ((e.clientX / window.innerWidth)  * 2 - 1) * MOUSE_PARALLAX_DIRECTION;
        mouse.target.y = ((e.clientY / window.innerHeight) * 2 - 1) * MOUSE_PARALLAX_DIRECTION;
      });

      // Mouse pencereden çıkınca yumuşakça orta noktaya geri dön
      document.addEventListener("mouseleave", () => {
        mouse.target.x = 0;
        mouse.target.y = 0;
      });
    }

    // ───────────── 2D smooth drag (Lenis-style lerp) ─────────────
    const wrapper = document.getElementById("canvasWrapper");

    // Tunables — feel'i buradan ayarla
    const LERP                   = 0.085; // current → target hız (büyük = daha keskin)
    const MOMENTUM_FRICTION      = 0.93;  // her frame velocity *= friction (küçük = hızlı durur)
    const MOMENTUM_STOP_VELOCITY = 0.04;  // px/ms eşiği — altına düşünce momentum biter
    const VELOCITY_SAMPLE_MS     = 80;    // pointer-up anında son kaç ms'lik hareket?
    const SNAP_ENABLED           = false;
    const CLICK_THRESHOLD_PX     = 5;     // bu mesafenin altı tıklama, üstü drag

    // Parallax — viewport-relative + per-card reach (organik desync):
    //   Her kart kendi viewport pozisyonuna göre parallax alır.
    //   Card center viewport ortasındayken parallax 0; kenarına yaklaştıkça MAX.
    //   Her kartın kendi REACH'i var → bazıları hızlıca peak'e ulaşır (düşük reach),
    //   bazıları yavaş ramp yapar (yüksek reach). X ve Y ayrı → çift eksenli desync.
    const IMAGE_OVERFLOW_PCT     = 0.18;  // CSS .card__image inset: -18% ile EŞİT olmalı
    const PARALLAX_MARGIN_USAGE  = 0.90;  // marjinin %90'ı kullanılır (kalan %10 güvenlik payı)
    const PARALLAX_REACH_GLOBAL  = 1.0;   // global çarpan (per-card reach buna eklenir)

    // Video viewport visibility — viewport sınırlarına ek pay (px). Hızlı drag/scroll
    // sırasında bu pay sayesinde kart hafif kenara taşsa bile play durumunu korur,
    // gereksiz play/pause flicker'ı önler.
    const VIDEO_VISIBLE_MARGIN   = 240;

    const state = {
      target:  { x: 0, y: 0 },
      current: { x: 0, y: 0 },
      bounds:  { minX: 0, maxX: 0, minY: 0, maxY: 0 },
      vw: window.innerWidth,
      vh: window.innerHeight,
    };

    const drag = {
      active: false,
      didMove: false,
      lastX: 0,
      lastY: 0,
      startX: 0,
      startY: 0,
      samples: [],   // [{x, y, t}] — pointer-up'ta velocity için
    };

    const momentum = {
      active: false,
      vx: 0,         // px / ms
      vy: 0,
    };

    let snapPending = false;
    let lastFrameTime = performance.now();

    function computeBounds() {
      state.vw = window.innerWidth;
      state.vh = window.innerHeight;
      const halfX = Math.max(0, (CANVAS_W - state.vw) / 2);
      const halfY = Math.max(0, (CANVAS_H - state.vh) / 2);
      state.bounds = { minX: -halfX, maxX: halfX, minY: -halfY, maxY: halfY };
    }
    computeBounds();

    const clamp = (v, min, max) => Math.max(min, Math.min(max, v));

    function setTarget(x, y) {
      state.target.x = clamp(x, state.bounds.minX, state.bounds.maxX);
      state.target.y = clamp(y, state.bounds.minY, state.bounds.maxY);
    }

    // En yakın kartın snap hedefini bul → setTarget. Lerp doğal animasyonu sağlar.
    function snapToNearest() {
      if (!cards.length) return;
      let best = null;
      let bestDist = Infinity;
      for (let i = 0; i < cards.length; i++) {
        const c = cards[i];
        const dx = c._snapX - state.target.x;
        const dy = c._snapY - state.target.y;
        const d = dx * dx + dy * dy; // squared, sqrt gerekmiyor
        if (d < bestDist) { bestDist = d; best = c; }
      }
      if (best) setTarget(best._snapX, best._snapY);
    }

    // Pointer-up anında son ~80ms'lik velocity'yi hesapla (px/ms)
    function computeReleaseVelocity() {
      const now = performance.now();
      const recent = drag.samples.filter(s => now - s.t <= VELOCITY_SAMPLE_MS);
      if (recent.length < 2) { momentum.vx = 0; momentum.vy = 0; return; }
      const first = recent[0];
      const last  = recent[recent.length - 1];
      const dt = last.t - first.t;
      if (dt <= 0) { momentum.vx = 0; momentum.vy = 0; return; }
      momentum.vx = (last.x - first.x) / dt;
      momentum.vy = (last.y - first.y) / dt;
    }

    function cancelMomentumAndSnap() {
      momentum.active = false;
      momentum.vx = 0;
      momentum.vy = 0;
      snapPending = false;
    }

    // ───────────── RAF loop ─────────────
    function raf(time) {
      const dt = Math.min(48, time - lastFrameTime); // ms — büyük sıçramaları sınırla
      lastFrameTime = time;

      // 1) Momentum: target'ı velocity ile ileri it, decay et
      if (momentum.active) {
        // friction'ı dt-bazlı uygula → 60fps'de FRICTION, diğer fps'lerde de aynı feel
        const decay = Math.pow(MOMENTUM_FRICTION, dt / 16.667);

        setTarget(
          state.target.x + momentum.vx * dt,
          state.target.y + momentum.vy * dt
        );
        momentum.vx *= decay;
        momentum.vy *= decay;

        const speed = Math.hypot(momentum.vx, momentum.vy);
        // Sınıra çarptıysa (target clamp edildi) o eksende velocity'yi öldür → "duvara çarpıp dur"
        if (state.target.x === state.bounds.minX || state.target.x === state.bounds.maxX) momentum.vx = 0;
        if (state.target.y === state.bounds.minY || state.target.y === state.bounds.maxY) momentum.vy = 0;

        if (speed < MOMENTUM_STOP_VELOCITY) {
          momentum.active = false;
          momentum.vx = 0;
          momentum.vy = 0;
          if (snapPending) { snapToNearest(); snapPending = false; }
        }
      }

      // 2) Lerp: current → target
      state.current.x += (state.target.x - state.current.x) * LERP;
      state.current.y += (state.target.y - state.current.y) * LERP;

      if (Math.abs(state.target.x - state.current.x) < 0.05) state.current.x = state.target.x;
      if (Math.abs(state.target.y - state.current.y) < 0.05) state.current.y = state.target.y;

      canvas.style.transform =
        `translate3d(calc(-50% + ${state.current.x}px), calc(-50% + ${state.current.y}px), 0)`;

      // Hero — canvas hareketinin tersini uygula → viewport ortasında sabit kalır.
      // DOM'da canvas-content içinde olduğu için z-index katmanlaması (front/back kartlar) korunur.
      if (hero) {
        hero.style.transform =
          `translate(-50%, -50%) translate3d(${-state.current.x}px, ${-state.current.y}px, 0)`;
      }

      // 3) Parallax — viewport-relative + per-card REACH (desync):
      //    nx = (currentX - snapX) / (halfVw * card._reachX)
      //    ↑ snapX = "kart viewport ortasında olsun istersem currentX ne olmalı" (precomputed)
      //    Düşük reach → hızlı saturate, yüksek reach → yavaş ramp. Aynı sürüklemede her kart
      //    farklı parallax tempoya sahip olduğu için organik desync feel'i oluşur.
      //    OPPOSITE direction → klasik depth/window feel.
      const halfVwBase = (state.vw / 2) * PARALLAX_REACH_GLOBAL || 1;
      const halfVhBase = (state.vh / 2) * PARALLAX_REACH_GLOBAL || 1;
      const maxTravelPct = IMAGE_OVERFLOW_PCT * PARALLAX_MARGIN_USAGE;

      for (let i = 0; i < cards.length; i++) {
        const card = cards[i];
        if (!card._imageEl) continue;

        let nx = (state.current.x - card._snapX) / (halfVwBase * card._reachX);
        let ny = (state.current.y - card._snapY) / (halfVhBase * card._reachY);
        if (nx >  1) nx =  1; else if (nx < -1) nx = -1;
        if (ny >  1) ny =  1; else if (ny < -1) ny = -1;

        const intensity = card._parallaxIntensity;
        const px = -nx * card._w * maxTravelPct * intensity;
        const py = -ny * card._h * maxTravelPct * intensity;

        card._imageEl.style.transform = `translate3d(${px}px, ${py}px, 0)`;
      }

      // 4) Mouse parallax — kart-seviyesinde transform (fine pointer only).
      //    mouse.current lerp ile target'a yaklaşır; sonra her kart kendi derinliğine
      //    (card._parallax) göre ölçeklenmiş bir translate alır.
      if (FINE_POINTER) {
        mouse.current.x += (mouse.target.x - mouse.current.x) * MOUSE_LERP;
        mouse.current.y += (mouse.target.y - mouse.current.y) * MOUSE_LERP;

        for (let i = 0; i < cards.length; i++) {
          const card = cards[i];
          const depth = card._parallax; // 1.0 – 2.6
          const mx = mouse.current.x * MOUSE_PARALLAX_STRENGTH * depth;
          const my = mouse.current.y * MOUSE_PARALLAX_STRENGTH * depth;
          card.style.transform = `translate3d(${mx}px, ${my}px, 0)`;
        }
      }

      // 5) Viewport-aware video play/pause — IntersectionObserver canvas
      //    transform değişimini güvenilir tetiklemediği için manuel bbox testi:
      //    kartın ekran merkezi = vw/2 + (current.x - snapX). Sadece video
      //    kartlarına bak ve sadece state değişiminde play/pause çağır.
      if (videoCards.length) {
        const vw = state.vw;
        const vh = state.vh;
        const margin = VIDEO_VISIBLE_MARGIN;
        for (let i = 0; i < videoCards.length; i++) {
          const card = videoCards[i];
          const cx = vw / 2 + (state.current.x - card._snapX);
          const cy = vh / 2 + (state.current.y - card._snapY);
          const halfW = card._w / 2;
          const halfH = card._h / 2;
          const visible =
            cx + halfW > -margin && cx - halfW < vw + margin &&
            cy + halfH > -margin && cy - halfH < vh + margin;

          if (visible !== card._isVisible) {
            card._isVisible = visible;
            const v = card._videoEl;
            if (visible) {
              const p = v.play();
              if (p && typeof p.catch === "function") p.catch(() => {});
            } else {
              v.pause();
            }
          }
        }
      }

      requestAnimationFrame(raf);
    }
    requestAnimationFrame((t) => { lastFrameTime = t; raf(t); });

    // ───────────── Intro orchestration ─────────────
    // Timeline: logo SVG çizim (1.6s) → fill (0.8s başlar, logo çizim bitmeden overlap)
    //           → subtitle fade-in → kartlar staggered drop.
    // Intro bitene kadar pointer/wheel eventleri bloke edilir (introLocked).
    let introLocked = true;

    (function runIntro() {
      const logoPaths = [...document.querySelectorAll(".hero__logo-path")];
      const subtitle  = document.querySelector(".hero__subtitle");
      if (!logoPaths.length) { introLocked = false; return; }

      // Her path için uzunluğu ölç ve CSS custom property olarak kendi elementine set et.
      // Birden fazla path varsa (BK monogramı = B + K) her biri kendi uzunluğunda dasharray alır
      // → ikisi de aynı sürede çizilir, görsel olarak senkron tamamlanır.
      logoPaths.forEach((p) => {
        const len = Math.ceil(p.getTotalLength());
        p.style.setProperty("--path-len", len);
      });

      // 1) Logo çizim başlat — tüm path'ler aynı anda
      requestAnimationFrame(() => {
        logoPaths.forEach((p) => p.classList.add("is-drawing"));
      });

      // 2) Logo çizim ~%70 tamamlandığında fill'e geç (overlap → akıcı geçiş)
      const drawDuration = 1600; // ms — CSS svgDraw ile eş
      const fillOverlap  = 0.70; // çizimin %70'inde fill başlar

      setTimeout(() => {
        logoPaths.forEach((p) => {
          p.classList.remove("is-drawing");
          p.style.strokeDashoffset = "0";
          p.classList.add("is-filling");
        });
      }, drawDuration * fillOverlap);

      // 3) Subtitle fade-in (logo çizim bittikten az sonra)
      setTimeout(() => {
        if (subtitle) subtitle.classList.add("is-visible");
      }, drawDuration * 0.85);

      // 4) Kartlar staggered drop — spiral sırasına göre (ring 1 önce, dış halka sonra)
      const cardDropStart = drawDuration * 0.80;
      const staggerStep   = 50; // ms — her kart arasındaki gecikme

      cards.forEach((card, idx) => {
        const delay = cardDropStart + idx * staggerStep;
        setTimeout(() => {
          card.style.animationDelay = "0ms";
          card.classList.add("is-intro");
        }, delay);
      });

      // 5) Tüm kartlar düştükten sonra intro kilidini aç + hint göster
      const totalIntroDuration = cardDropStart + cards.length * staggerStep + 700;
      setTimeout(() => {
        introLocked = false;
        cards.forEach((c) => {
          c.classList.remove("is-intro");
          c.classList.add("is-ready");
        });
        const hint = document.querySelector(".hint");
        if (hint) hint.classList.add("is-visible");
        const navbar = document.querySelector(".navbar");
        if (navbar) navbar.classList.add("is-visible");
      }, totalIntroDuration);
    })();

    // ───────────── Pointer (mouse + touch unified) ─────────────
    wrapper.addEventListener("pointerdown", (e) => {
      if (introLocked) return;
      // Yeni etkileşim → bekleyen momentum/snap'i hemen iptal et (kullanıcı kontrolü ele alır)
      cancelMomentumAndSnap();

      drag.active = true;
      drag.didMove = false;
      drag.lastX = drag.startX = e.clientX;
      drag.lastY = drag.startY = e.clientY;
      drag.samples = [{ x: e.clientX, y: e.clientY, t: performance.now() }];
      wrapper.classList.add("is-dragging");
      wrapper.setPointerCapture?.(e.pointerId);
    });

    wrapper.addEventListener("pointermove", (e) => {
      if (!drag.active) return;
      const dx = e.clientX - drag.lastX;
      const dy = e.clientY - drag.lastY;
      drag.lastX = e.clientX;
      drag.lastY = e.clientY;

      if (Math.hypot(e.clientX - drag.startX, e.clientY - drag.startY) > CLICK_THRESHOLD_PX) {
        drag.didMove = true;
      }

      // Velocity sample buffer — sadece son ~120ms tut
      const now = performance.now();
      drag.samples.push({ x: e.clientX, y: e.clientY, t: now });
      const cutoff = now - 120;
      while (drag.samples.length > 0 && drag.samples[0].t < cutoff) drag.samples.shift();

      setTarget(state.target.x + dx, state.target.y + dy);
    });

    function endDrag(e) {
      if (!drag.active) return;
      drag.active = false;
      wrapper.classList.remove("is-dragging");
      try { wrapper.releasePointerCapture?.(e.pointerId); } catch {}

      // Sadece gerçekten sürüklendiyse momentum + snap düşün
      if (!drag.didMove) {
        drag.samples.length = 0;
        return;
      }

      computeReleaseVelocity();
      drag.samples.length = 0;

      const releaseSpeed = Math.hypot(momentum.vx, momentum.vy);
      snapPending = SNAP_ENABLED;

      if (releaseSpeed < MOMENTUM_STOP_VELOCITY) {
        // Hız çok düşük — momentum'u atla, doğrudan snap
        momentum.active = false;
        momentum.vx = 0;
        momentum.vy = 0;
        if (snapPending) { snapToNearest(); snapPending = false; }
      } else {
        momentum.active = true;
      }
    }

    wrapper.addEventListener("pointerup",     endDrag);
    wrapper.addEventListener("pointercancel", endDrag);
    wrapper.addEventListener("pointerleave",  endDrag);

    // ───────────── Wheel / trackpad (iki eksen) ─────────────
    wrapper.addEventListener("wheel", (e) => {
      e.preventDefault();
      if (introLocked) return;
      cancelMomentumAndSnap();
      setTarget(state.target.x - e.deltaX, state.target.y - e.deltaY);
    }, { passive: false });

    // ───────────── Resize ─────────────
    let resizeTimer;
    window.addEventListener("resize", () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        computeBounds();
        // Sınırların yeni hâline göre re-clamp
        setTarget(state.target.x, state.target.y);
      }, 100);
    });

    // ───────────── Sürükleme sırasında native image drag'i tamamen kapat ─────────────
    document.addEventListener("dragstart", (e) => e.preventDefault());
  </script>
</body>
</html>
