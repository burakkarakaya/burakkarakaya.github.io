<header class="fixed lg:sticky w-full top-0 z-40">
        <div class="absolute top-10 left-[50px] flex items-center menu-anim-text">
            <button class="text-gray-600 hover:text-gray-600 hover:bg-white transition duration-300 px-[4px] py-[4px] rounded-full border-2 border-white text-white text-sm mr-4" data-follower-text="" aria-label="Dil Değiştir">EN</button>
            <button id="whatsapp-btn" data-whatsapp-number="" data-whatsapp-text="Merhaba, bilgi almak istiyorum." class="text-gray-600 hover:text-gray-600 hover:bg-white transition duration-300 px-[4px] py-[4px] rounded-[16px] border-2 border-white text-white text-xl flex" data-follower-text="" aria-label="Mesaj"><i class="ti ti-message"></i></button>
        </div>
        <div class="absolute top-10 right-[50px] flex items-center menu-anim">
            <button id="quote-open-btn" class="ml-4 text-2xl text-white hover:text-gray-600 hover:bg-white transition duration-300 rounded-[16px] py-[1px] px-3 flex items-center justify-center border-2 border-white gap-2" data-follower-text="" aria-label="Teklif Talep"><i class="ti ti-bolt text-lg"></i> <span class="text-sm">TEKLİF</span></button>
            <button class="menu-btn ml-4 text-2xl text-white hover:text-gray-600 hover:bg-white transition duration-300 rounded-[16px] py-[2px] px-3 flex items-center justify-center border-2 border-white gap-2" data-follower-text="" aria-label="Menü Aç"><i class="ti ti-menu-3"></i> <span class="text-sm">MENU</span></button>
        </div>
        <!-- Mobil Header: Logo solda, ikonlar sağda -->
        <div class="mobile-header px-4 py-2 hidden">
            <a href="#" class="mobile-logo flex items-center" aria-label="Anasayfa">
                <img src="assets/images/YBLogo.svg" alt="Logo" class="h-8 w-auto" />
            </a>
            <div class="flex items-center gap-2">
                <button id="quote-open-btn-mobile" class="w-10 h-10 flex items-center justify-center rounded-full border border-white/50 text-white bg-black/30" aria-label="Teklif Talep">
                    <i class="ti ti-bolt text-lg"></i>
                </button>
                <button class="menu-btn-mobile w-10 h-10 flex items-center justify-center rounded-full border border-white/50 text-white bg-black/30" aria-label="Menü Aç">
                    <i class="ti ti-menu-3 text-lg"></i>
                </button>
            </div>
        </div>
